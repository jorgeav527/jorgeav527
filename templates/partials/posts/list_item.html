{% if not post %}
  {% set post = page %}
{% endif %}
<a href="{{ post.permalink }}" class="flex flex-col p-5 rounded-2xl
      bg-entry border border-border/40
      transition-all duration-300
      hover:border-accent/50 hover:shadow-lg hover:-translate-y-1">
  <div class="flex flex-col gap-1 mb-3">
    <h2 class="text-xl font-bold text-primary group-hover:text-accent transition-colors">
      {{ post.title }}
    </h2>
    {% if post.description %}
    <p class="text-sm text-secondary line-clamp-1 transition-all duration-500 delay-500 group-hover:line-clamp-none">
      {{ post.description | striptags }}
    </p>
    {% endif %}
  </div>
  <div class="flex items-center justify-between">
    <time class="text-xs font-mono text-accent">
      {{ post.date | date(format="%b %d, %Y") }}
    </time>
    <span class="text-xs font-bold text-accent">
      READ MORE <span>&nbsp;→</span>
    </span>
  </div>
</a>
