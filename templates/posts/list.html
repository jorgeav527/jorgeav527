{% extends "base.html" %}

{% block title %}Blog | {{ config.title }}{% endblock title %}

{% block content %}
<main class="mx-auto max-w-3xl px-6 pt-20">
  <h1 class="text-3xl font-bold mb-8 text-primary">Writing</h1>
  <ul class="space-y-6">
    {% for post in section.pages %}
    <li class="group">
      <a href="{{ post.permalink }}" class="flex justify-between items-baseline">
        <h2 class="text-xl font-medium group-hover:text-accent transition-colors">
          {{ post.title }}
        </h2>
        <span class="text-sm text-secondary/60 font-mono">
          {{ post.date | date(format="%Y-%m-%d") }}
        </span>
      </a>
    </li>
    {% endfor %}
  </ul>
</main>
{% endblock content %}
