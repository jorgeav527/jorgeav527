{% extends "base.html" %}

{% block title %}{{ page.title }} | {{ config.title }}{% endblock title %}

{% block content %}
<article class="mx-auto max-w-3xl px-6">
  <header class="mb-8">
    <h1 class="text-4xl font-black text-accent mb-2">{{ page.title }}</h1>
    <time class="text-secondary font-mono">{{ page.date | date(format="%B %e, %Y") }}</time>
  </header>

  <div class="prose-catppuccin text-base">
    {{ page.content | safe }}
  </div>
</article>
{% endblock content %}
