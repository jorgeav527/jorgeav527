<!DOCTYPE html>
<html lang="{{ lang | default(value='en') }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ section.title | default(value="Resume") }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ get_url(path='style.css') | safe }}">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro&display=swap"
    rel="stylesheet">


  <style>
    @media print {
      @page {
        /* This defines the actual white space on the paper */
        margin: 15mm;
        size: A4;
      }

      body {
        background-color: white;
        -webkit-print-color-adjust: exact;
      }

      .no-print {
        display: none !important;
      }

      .resume-page {
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        box-shadow: none !important;
      }
    }

    /* Screen Preview Only */
    .resume-page {
      background: white;
      width: 210mm;
      min-height: 297mm;
      margin: 20px auto;
      padding: 15mm;
      /* This mimics the @page margin on your screen */
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>

<body class="bg-gray-100 font-sans text-slate-900 antialiased">

  <div class="fixed bottom-8 right-8 no-print">
    <button onclick="window.print()"
      class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-full shadow-lg transition-transform hover:scale-105 flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
        <path
          d="M5 1a2 2 0 0 0-2 2v1h10V3a2 2 0 0 0-2-2H5zm6 8H5a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-3a1 1 0 0 0-1-1z" />
        <path
          d="M0 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-1v-2a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2H2a2 2 0 0 1-2-2V7zm2.5 1a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1z" />
      </svg>
      Print to PDF
    </button>
  </div>

  <div class="resume-page">
    {% block content %}{% endblock content %}
  </div>

</body>

</html>
