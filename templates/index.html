<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ config.title }}</title>
  
  <link rel="stylesheet" href="{{ get_url(path='style.css', cachebuster=true) }}">

  <script>
    /* SIMPLE THEME CHECK: Run immediately to set colors before body renders */
    if (localStorage.getItem("pref-theme") === "light" || 
        (!localStorage.getItem("pref-theme") && window.matchMedia("(prefers-color-scheme: light)").matches)) {
      document.documentElement.setAttribute("data-theme", "light");
    }
  </script>
</head>

<body class="bg-theme text-primary selection:bg-accent/30 selection:text-accent transition-colors duration-300 min-h-screen">

  <nav class="mx-auto max-w-5xl px-6 h-15 flex items-center justify-between border-b-3">
    <div class="flex items-center">
      <a href="/" class="text-xl font-bold tracking-tighter text-accent hover:opacity-80 transition-opacity">
        Docs CordStart
      </a>
    </div>

    <div class="flex items-center gap-8">
      <ul class="flex items-center gap-6 text-sm font-medium uppercase tracking-widest text-secondary">
        <li><a href="/posts" class="hover:text-primary transition-colors">Posts</a></li>
        <li><a href="/projects" class="hover:text-primary transition-colors">Projects</a></li>
        <li><a href="/blog" class="hover:text-primary transition-colors">Blog</a></li>
      </ul>
      {% include "theme_toggle.html" %}
    </div>
  </nav>

  <main class="mx-auto max-w-nav px-gap pt-16 md:pt-32 pb-20">
      <div class="flex justify-center w-full">
          <header class="flex flex-col md:flex-row items-center md:items-start gap-10 md:gap-16 mb-24 max-w-fit">
            <div class="shrink-0">
              <img src="{{ get_url(path='me_01.png') }}" alt="Jorge Alarcón" 
                   class="w-32 h-42 md:w-48 md:h-58 rounded-2xl object-cover shadow-2xl ring-3 ring-entry transition-transform hover:scale-105 duration-300">
            </div>
            <div class="text-center md:text-left max-w-xl">
              <h1 class="text-3xl md:text-4xl font-black text-primary mb-4 tracking-tight">
                  Jorge Alarcón Vargas
              </h1>
              <div class="prose-catppuccin text-base">
                {{ section.content | safe }}
              </div>
              {% include "social_links.html" %}
            </div>
          </header>
      </div>
  </main>

  <footer class="text-center py-auto text-xs text-secondary/40 font-mono">
    &copy; {{ now() | date(format="%Y-%b") }} by CordStart
  </footer>

  <script>
    /* TOGGLE LOGIC */
    const btn = document.getElementById("theme-toggle");
    btn.addEventListener("click", () => {
      const html = document.documentElement;
      if (html.getAttribute("data-theme") === "light") {
        html.removeAttribute("data-theme");
        localStorage.setItem("pref-theme", "dark");
      } else {
        html.setAttribute("data-theme", "light");
        localStorage.setItem("pref-theme", "light");
      }
    });
  </script>
</body>
</html>
