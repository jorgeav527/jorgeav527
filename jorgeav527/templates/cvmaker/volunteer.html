<h3 class="my-3 font-weight-bold">{{ volunter|upper }}</h3>
<h5 class="card-title">{{ vol_organization }}</h5>
<h5 class="card-subtitle text-primary">{{ vol_name }}</h5>
<small class="text-muted text-wrap mr-4">
    <i class="bi bi-calendar3"></i> {{ vol_start }}-{{ vol_end }}
</small>
<small class="text-muted text-wrap">
    <i class="bi bi-geo-alt-fill"></i> {{ vol_location }}
</small>
<p class="text-justify" style="line-height: 1.35em;">{{ vol_description }}</p>
